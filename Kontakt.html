<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riefix Strategie &amp; Consulting</title>
  <meta name="description" content="Riefix Strategie &amp; Consulting – Beratung, Strategieentwicklung und digitale Lösungen für Unternehmen.">
  <link rel="icon" href="/Pictures/Firmenlogo.ico" type="image/x-icon">
  <!-- Optional: Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&amp;display=swap" rel="stylesheet">
  <!-- Optional: CSS Datei -->
  <link rel="stylesheet" href="styles.css">
  <!-- Optional: Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>

    <header>
        <h1 id="firmenname">Riefix Strategie &amp; Consulting</h1>
        <h2 id="werbespruch">Ihr Partner für messbaren Erfolg</h2>
        <img id="Firmenlogo" src="Firmenlogo.png" alt="Riefix Logo">
        <div class="dropdown-container">
          <nav class="dropdown">
            <button class="dropbtn">Menü</button>
            <div class="dropdown-content">
              <a href="index.html">Startseite</a>
              <a href="Leistungen.html">Leistungen</a>
              <a href="Kontakt.html">Kontakt</a>
            </div>
          </nav>
    </div>
    </header>

    <h1 id="Kontakt">Kontaktier uns!</h1>

    <form id="contact-form"
     action="https://formspree.io/f/xjkapyyn"
     method="POST"
    >
  <div class="form-group">
    <label id="name-label">
      Deine E-Mail:
      <input type="email" name="email" required>
    </label>
    <label id="anliegen-label">
      Anliegen:
      <select name="anliegen" id="anliegen-select" required>
        <option value="" disabled selected>Bitte wählen...</option>
        <option value="beratung">Beratung</option>
        <option value="angebot">Angebot einholen</option>
        <option value="support">Support</option>
        <option value="sonstiges">Sonstiges</option>
      </select>
    </label>
    <!-- Angebots-Leistungen Dropdown, standardmäßig versteckt -->
    <div id="angebot-leistungen" style="display:none;">
      <label>
        Gewünschte Leistung:
        <select name="leistung" id="leistung-select">
          <option value="" disabled selected>Bitte wählen...</option>
          <option value="seo">SEO-Optimierung</option>
          <option value="webdesign">Webdesign</option>
          <option value="beratung">Strategieberatung</option>
          <option value="digitalisierung">Digitalisierung</option>
          <!-- Weitere Leistungen kannst du hier ergänzen -->
        </select>
      </label>
    </div>
    <!-- Support-Felder direkt nach Anliegen-Auswahl -->
    <div id="support-fields" style="display:none;">
      <label>
        Sind Sie bereits Kunde?
        <div style="display: flex; gap: 16px; margin-top: 6px;">
          <label style="color: #fff; font-weight: normal;">
            <input type="checkbox" name="kunde" value="ja" id="kunde-ja"> Ja
          </label>
          <label style="color: #fff; font-weight: normal;">
            <input type="checkbox" name="kunde" value="nein" id="kunde-nein"> Nein
          </label>
        </div>
      </label>
      <label>
        Projektname oder Kundennummer:
        <input type="text" name="projektname" id="projektname">
      </label>
    </div>
    <!-- Jetzt Thema/Betreff -->
    <label id="betreff-label">
      Thema/Betreff:
      <input type="text" name="betreff" required>
    </label>
    <label id="message-label">
      Nachricht:
      <textarea name="message" required></textarea>
    </label>
    <label id="attachment-label">
      Datei hinzufügen (optional):
      <input type="file" name="attachment" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx">
    </label>
    <button type="submit" id="send-button">Senden</button>
  </div>
</form>

  <footer class="footer">
    <p id="footer-text">© 2025 <!--Riefix Strategie &amp; Consulting-->Schlebach Digital. Alle Rechte vorbehalten.</p>
    <div id="legal-links">
      <a href="Impressum.html" id="legal-links-text">Impressum</a> | <a href="Privacy_Policy.html" id="legal-links-text">Privacy Policy</a> | <a href="AGB.html" id="legal-links-text">AGB</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

  <script>
document.addEventListener('DOMContentLoaded', function() {
  const anliegenSelect = document.getElementById('anliegen-select');
  const supportFields = document.getElementById('support-fields');
  const angebotLeistungen = document.getElementById('angebot-leistungen');
  const kundeJa = document.getElementById('kunde-ja');
  const kundeNein = document.getElementById('kunde-nein');
  const projektname = document.getElementById('projektname');

  // Nur eine Checkbox auswählbar machen
  if (kundeJa && kundeNein) {
    kundeJa.addEventListener('change', function() {
      if (kundeJa.checked) kundeNein.checked = false;
    });
    kundeNein.addEventListener('change', function() {
      if (kundeNein.checked) kundeJa.checked = false;
    });
  }

  if (anliegenSelect) {
    anliegenSelect.addEventListener('change', function() {
      // Support-Felder anzeigen/verstecken
      if (anliegenSelect.value === 'support') {
        supportFields.style.display = 'block';
      } else {
        supportFields.style.display = 'none';
        if (kundeJa) kundeJa.checked = false;
        if (kundeNein) kundeNein.checked = false;
        if (projektname) projektname.value = '';
      }
      // Angebots-Leistungen anzeigen/verstecken
      if (anliegenSelect.value === 'angebot') {
        angebotLeistungen.style.display = 'block';
      } else {
        angebotLeistungen.style.display = 'none';
        const leistungSelect = document.getElementById('leistung-select');
        if (leistungSelect) leistungSelect.selectedIndex = 0;
      }
    });
    // Initial prüfen (falls Browser Autofill macht)
    if (anliegenSelect.value === 'support') {
      supportFields.style.display = 'block';
    }
    if (anliegenSelect.value === 'angebot') {
      angebotLeistungen.style.display = 'block';
    }
  }
});
</script>

</body>
</html>
